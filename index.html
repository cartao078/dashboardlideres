<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard V32.0 - CDT CEILÂNDIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════════════════
         SIDEBAR
    ═══════════════════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <!-- Logo -->
        <div class="sidebar-logo">
            <img src="logo.png" alt="Cartão de Todos" class="sidebar-logo-img">
            <div class="sidebar-logo-label">CDT CEILÂNDIA</div>
        </div>

        <!-- Nav -->
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">DASHBOARDS</div>

            <button class="sidebar-btn active" data-dashboard="resumo">
                <span class="sidebar-btn-icon"><i class="fas fa-chart-line"></i></span>
                <span class="sidebar-btn-label">Resumo</span>
            </button>
            <button class="sidebar-btn" data-dashboard="documentacao">
                <span class="sidebar-btn-icon"><i class="fas fa-folder-open"></i></span>
                <span class="sidebar-btn-label">Vendas</span>
            </button>
            <button class="sidebar-btn" data-dashboard="app">
                <span class="sidebar-btn-icon"><i class="fas fa-mobile-alt"></i></span>
                <span class="sidebar-btn-label">App</span>
            </button>
            <button class="sidebar-btn" data-dashboard="adimplencia">
                <span class="sidebar-btn-icon"><i class="fas fa-credit-card"></i></span>
                <span class="sidebar-btn-label">Adimplência</span>
            </button>
            <button class="sidebar-btn" data-dashboard="recorrencia">
                <span class="sidebar-btn-icon"><i class="fas fa-redo"></i></span>
                <span class="sidebar-btn-label">Recorrência</span>
            </button>
            <button class="sidebar-btn" data-dashboard="recorrencia_vendedor">
                <span class="sidebar-btn-icon"><i class="fas fa-handshake"></i></span>
                <span class="sidebar-btn-label">Rec. Vendedor</span>
            </button>
            <button class="sidebar-btn" data-dashboard="refuturiza">
                <span class="sidebar-btn-icon"><i class="fas fa-book-open"></i></span>
                <span class="sidebar-btn-label">Refuturiza</span>
            </button>
            <button class="sidebar-btn" data-dashboard="campanha14">
                <span class="sidebar-btn-icon"><i class="fas fa-trophy"></i></span>
                <span class="sidebar-btn-label">Campanha 14°</span>
            </button>
        </nav>

        <!-- Sidebar footer -->
        <div class="sidebar-footer">
            <div class="sidebar-footer-label">Versão 21.0</div>
            <div class="sidebar-footer-sub">API Apps Script + Supabase</div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════════════════════
         MAIN AREA
    ═══════════════════════════════════════════════════════ -->
    <div class="main-wrapper">

        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <!-- Hamburguer (mobile) -->
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-title" id="topbarTitle">Resumo Geral</div>
            </div>

            <div class="topbar-center" id="periodSelector">
                <div class="select-group">
                    <label for="monthSelect"><i class="far fa-calendar-alt"></i> Mês</label>
                    <select id="monthSelect">
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="select-group">
                    <label for="yearSelect"><i class="far fa-calendar"></i> Ano</label>
                    <select id="yearSelect"></select>
                </div>
            </div>

            <div class="topbar-right">
                <span class="topbar-update">
                    <i class="fas fa-clock"></i>
                    <span id="lastUpdate">—</span>
                </span>
                <button class="btn btn-topbar-refresh" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    <span>Atualizar</span>
                </button>
                <button class="btn btn-topbar-export" id="downloadBtn">
                    <i class="fas fa-download"></i>
                    <span>Exportar</span>
                </button>
            </div>
        </header>

        <!-- Content -->
        <main class="dashboard-content" id="dashboardContent">
            <div class="loading" id="loading" style="display:flex;">
                <div class="spinner"></div>
                <p>Carregando dados do dashboard...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Dashboard V21.0 &nbsp;|&nbsp; CDT CEILÂNDIA &nbsp;|&nbsp; API Google Apps Script + Supabase</p>
        </footer>

    </div>

    <!-- Overlay mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
